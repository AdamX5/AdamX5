name: Generate Metrics

on:
  # Run every 24 hours
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - master
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate metrics.isocalendar.svg (half-year, light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          output_action: none
          filename: metrics.isocalendar.svg

      - name: generate metrics.isocalendar.fullyear.svg (full-year, light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: none
          filename: metrics.isocalendar.fullyear.svg

      - name: collect rendered assets
        run: |
          mkdir -p dist
          cp /metrics_renders/metrics.isocalendar.svg dist/
          cp /metrics_renders/metrics.isocalendar.fullyear.svg dist/

      - name: derive dark variants
        run: |
          for f in metrics.isocalendar.svg metrics.isocalendar.fullyear.svg; do
            dark="dist/${f%.svg}.dark.svg"
            cp "dist/$f" "$dark"
            sed -i \
              -e 's/#ebedf0/#161b22/g' \
              -e 's/#9be9a8/#0e4429/g' \
              -e 's/#40c463/#006d32/g' \
              -e 's/#30a14e/#26a641/g' \
              -e 's/#216e39/#39d353/g' \
              -e 's/color:#777/color:#c9d1d9/g' \
              "$dark"
          done

      - name: push generated assets to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
